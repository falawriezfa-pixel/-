<!DOCTYPE html>  
<html dir=**"**rtl**"**>  
<head>  
<meta charset=**"**UTF-8**"**>  
<title>**نموذج**</title>  
<style>  
body{  
    background:#050505;  
    font-family:sans-serif;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    height:100vh;  
}  
.box{  
    width:400px;  
    background:#111;  
    padding:20px;  
    border-radius:20px;  
    color:white;  
}  
input,textarea{  
    width:100%;  
    background:#0a0a15;  
    border:1px solid #333;  
    color:white;  
    padding:12px;  
    border-radius:10px;  
    margin-top:10px;  
}  
button{  
    width:100%;  
    margin-top:15px;  
    padding:14px;  
    border:none;  
    border-radius:12px;  
    background:linear-gradient**(**90deg,#ff2d2d,#ff7070**)**;  
    color:white;  
}  
</style>  
</head>  
<body>  
  
<div class=**"**box**"**>  
<h2>**العنوان**</h2>  
<input placeholder=**"البريد"**>  
<input placeholder=**"الموضوع"**>  
<textarea rows=**"**5**"**></textarea>  
<button>**إرسال**</button>  
</div>  
  
</body>  
</html>
